# ============================================================
# 论文格式化配置文件 — 华南农业大学 (SCAU) 2024 默认配置
# ============================================================
# 使用方法:
#   1. 复制此文件到 thesis-format.exe 同目录，重命名为 thesis_config.yaml
#   2. 修改需要调整的参数（未修改的参数自动使用默认值）
#   3. 运行: thesis-format.exe --input 论文.docx
#
# 也可用 --config 指定配置文件:
#   thesis-format.exe --input 论文.docx --config 我的学校.yaml
# ============================================================

meta:
  school_name: "华南农业大学"        # 学校名称（显示在工具标题和日志中）
  config_version: 1

# ---- 页面设置 ----
page:
  margins:                           # 页边距 (cm)
    top: 2.4
    bottom: 2.4
    left: 2.4
    right: 2.4
  gutter: 0.5                       # 装订线 (cm)
  header_distance: 1.5              # 页眉上边距 (cm)
  footer_distance: 1.75             # 页脚下边距 (cm)

# ---- 字体 ----
fonts:
  latin: "Times New Roman"          # 西文/数字字体
  body: "宋体"                       # 正文中文字体
  h1: "黑体"                         # 一级标题中文字体
  h2: "黑体"                         # 二级标题
  h3: "楷体"                         # 三级标题
  h4: "楷体"                         # 四级标题

# ---- 字号 (支持多单位) ----
# 单位格式：数值(默认pt) / 数字+pt / 数字+cm / 数字+mm / 数字+in / 中文字号
# 示例: 12 / 12pt / 0.42cm / 4.23mm / 0.17in / 小四
sizes:
  body: 12                           # 小四 (12pt)
  h1: 14                             # 四号 (14pt)
  h2: 12                             # 小四
  h3: 12                             # 小四
  h4: 12                             # 小四
  caption: 10.5                      # 五号 (10.5pt)
  note: 9                            # 小五 (9pt)
  footnote: 9                        # 小五
  page_number: 10.5                  # 五号

# ---- 标题格式 ----
# space_before/space_after 支持多单位（pt/cm/mm/in/中文字号）
headings:
  h1:
    bold: true
    align: left                      # left / center / right / justify
    space_before: 0
    space_after: 0
  h2:
    bold: true
    align: left
    space_before: 0
    space_after: 0
  h3:
    bold: false
    align: left
    space_before: 0
    space_after: 0
  h4:
    bold: false
    align: left
    space_before: 0
    space_after: 0
# ---- 正文格式 ----
# first_line_indent 支持多单位（pt/cm/mm/in/中文字号）
body:
  align: justify                     # 两端对齐
  first_line_indent: 24              # 首行缩进 (24pt = 2个中文字符)
  line_spacing: 1.5                  # 行距倍数
  space_before: 0
  space_after: 0
# ---- 表格 ----
table:
  line_spacing: 1.0                  # 表格内单倍行距
  cell_align: center                 # 表格内容居中
  top_border_sz: 12                  # 顶线粗细 (1/8 pt)，12 = 1.5pt
  header_border_sz: 8                # 栏目线 (1/8 pt)，8 = 1pt
  bottom_border_sz: 12               # 底线 (1/8 pt)，12 = 1.5pt

# ---- 脚注 ----
footnote:
  line_spacing: 1.0
  align: justify

# ---- 图表题 ----
captions:
  mode: "dynamic"                         # 题注模式: stable / dynamic（默认推荐）
  figure_pattern: '^图\s*\d'             # 图题正则
  table_pattern: '^(续)?表\s*\d'         # 表题正则
  subfigure_pattern: '^\([a-z]\)'        # 分图题正则（可删除）
  note_pattern: '^注[：:]'                 # 图表注释/资料来源行正则
  keep_with_next: true                     # 图表题防分页
  check_numbering: true                    # 检查图表编号连续性
  line_spacing: 1.5                        # 题注/表注行距倍数
  font: "宋体"
  number_font: "Times New Roman"
  size: 10.5
  # dynamic 仅适用于真正 Heading 样式 + Word 多级列表编号的规范文档；
  # 预检不通过时会自动回退 stable，并给出明确 warning。
  include_chapter: false                   # 华农规范要求图表全文连续编号（如 图1、表1）
  chapter_heading_level: 1                 # 章节编号引用的标题级别（1=章，2=节）
  chapter_separator: '.'                   # 章节号与图表序号之间的分隔符（可通过GUI修改）
  caption_separator: ''                    # 编号与标题文字之间的附加分隔符
  restart_per_chapter: false               # 华农规范要求图表全文连续编号

# ---- 参考文献 ----
references:
  first_line_indent: -24             # 悬挂缩进首行 (pt)
  left_indent: 24                    # 左缩进 (pt)

# ---- 页码 ----
page_numbers:
  front_format: "upperRoman"        # 前置部分: upperRoman / lowerRoman / decimal
  body_format: "decimal"            # 正文部分: decimal / lowerRoman
  front_start: 1                     # 前置部分起始页码
  body_start: 1                      # 正文起始页码
  only_insert: false                 # 仅按现有分节调整页码，不自动补分节
  front_position: "center"          # 前置部分页码居中
  body_position: "center"           # 正文页码居中
  body_odd_position: "center"
  body_even_position: "center"
  decorator: "{page}"               # 页码两侧不加修饰线
  font: ""                          # 留空时回退 Times New Roman
  bold: false

# ---- 页眉 ----
# 华农本科论文规范要求全部不加页眉。
header_footer:
  enabled: false
  scope: "body"
  only_insert: false
  different_odd_even: false
  first_page_no_header: false
  odd_page_text: ""
  even_page_text: ""
  font: "宋体"
  font_size: 10.5
  bold: false
  odd_page_align: "center"
  even_page_align: "center"
  border_bottom: false
  border_bottom_width: 0.75
  border_bottom_style: "single"

# ---- 目录 ----
toc:
  depth: 3                           # 目录显示层级 (1-4)
  enabled: true                      # 是否生成目录
  only_insert: false                 # 仅插入/更新目录，不改正文等其他排版
  exclude_abstract_headings: true    # 摘要/Abstract 不参与目录；会解除其 Heading 样式并尽量保留原格式
  font: "宋体"                       # 目录内容字体
  font_size: 12                      # 目录内容字号 (pt)，小四
  bold: false                        # 目录条目不加粗
  h1_font: "宋体"                    # 华农规范目录各级条目统一用宋体小四
  h1_font_size: 12                   # 一级目录条目字号 (pt)，小四
  h1_bold: false                     # 一级目录条目不加粗
  line_spacing: 1.5                  # 目录行距
  space_before: 0
  space_after: 0
# ---- 特殊标题映射 ----
# match: 原文关键词（去除空格后匹配）
# display: 显示文本（可包含全角空格用于间距控制）
# align: 对齐方式
special_titles:
  - match: "摘要"
    display: "摘        要"
    align: center
  - match: "目录"
    display: "目        录"
    align: center
  - match: "英文缩略词（符号表）"
    display: "英文缩略词（符号表）"
    align: center
  - match: "参考文献"
    display: "参  考  文  献"
    align: center
  - match: "致谢"
    display: "致        谢"
    align: center

# ---- 前置部分 ----
front_matter:
  mode: "auto"                      # auto / skip / format

# ---- 结构识别模式 (正则表达式) ----
sections:
  chapter_pattern: '^\d+(\s|(?=[\u4e00-\u9fff]))'     # 华农理工农科一级标题示例：1  绪论
  appendix_pattern: '^附录\s*[A-Z]'                      # 附录标题格式
  h2_pattern: '^\d+\.\d+(\s|(?=[\u4e00-\u9fff]))'   # 二级标题
  h3_pattern: '^\d+\.\d+\.\d+(\s|(?=[\u4e00-\u9fff]))'              # 三级标题
  h4_pattern: '^\d+\.\d+\.\d+\.\d+(\s|(?=[\u4e00-\u9fff]))'       # 四级标题
  special_h1:                                  # 特殊一级标题（无编号）
    - "参考文献"
    - "致谢"
  renumber_headings: true                      # 自动修正标题编号
  cn_keywords_pattern: '^\s*关键词\s*[：:]'
  en_abstract_pattern: '(?i)^\s*Abstract\s*[：:]'
  en_keywords_pattern: '(?i)^\s*Key\s*words\s*[：:]'

# ---- 封面 ----
# enabled: true  使用默认封面
# enabled: false 不生成封面
cover:
  enabled: true
  only_insert: false                 # 仅插入外部封面，不修改正文与其他排版
  logo: "scau_logo.png"             # Logo 文件名（相对于配置文件目录）
  logo_width_pt: 343.2              # Logo 宽度 (pt)
  logo_height_pt: 96                # Logo 高度 (pt)
  title_text: "本科毕业论文"         # 如为毕业设计，请改为“本科毕业设计”
  title_font_size: 36                # 封面大标题字号 (pt)
  thesis_title_placeholder: "论文（或设计）题目"
  thesis_title_font: "黑体"
  thesis_title_size: 22              # 论文题目字号 (pt)
  fields:                            # 信息栏字段（下划线长度，单位：空格数）
    - label: "学    院:"
      underline_chars: 34
    - label: "专    业:"
      underline_chars: 34
    - label: "姓    名:"
      underline_chars: 34
    - label: "学    号:"
      underline_chars: 34
  advisor:
    label: "指导教师:"
    underline_chars: 16
    title_label: "职称"
    title_underline_chars: 16
  date:
    label: "提交日期："
    segments: ["年", "月", "日"]
    segment_underline_chars: 10

# ---- 声明页 ----
declarations:
  - title: "华南农业大学本科毕业论文（设计）原创性声明"
    body: >
      本人郑重声明：所呈交的毕业论文（设计），是本人在导师的指导下，
      独立进行研究工作所取得的成果。除文中已经注明引用的内容外，本论文
      不包含任何其他个人或集体已经发表或撰写过的作品成果。对本文的研究
      做出重要贡献的个人和集体，均已在文中以明确方式标明。本人完全意识
      到本声明的法律结果由本人承担。
    signature: "作者签名：                        日期：       年     月     日"

  - title: "华南农业大学本科毕业论文（设计）使用授权声明"
    body: >
      本人完全了解学校有关保留、使用毕业论文（设计）的规定，同意学校
      保留并向国家有关部门或机构送交毕业论文（设计）的复印件和电子版，
      允许毕业论文（设计）被查阅和借阅。学校可以将本毕业论文（设计）的
      全部或部分内容编入有关数据库进行检索，可以采用影印、缩印或扫描等
      复制手段保存和汇编毕业论文（设计）。
    signature: "作者签名：                           指导教师签名：                        "
    date_line: "日期：       年      月      日      日期：     年      月      日"

# ---- 主题字体 ----
theme_fonts:
  latin: "Times New Roman"
  hans: "宋体"

